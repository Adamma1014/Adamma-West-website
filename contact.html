<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Adamma West</title>
    <style>
        :root {
            --bold-pink: #ff007f;
            --accent-pink: #ff66b2;
            --bg-pink: #fff0f6;
            --rich-black: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            margin: 0;
            background-color: var(--bg-pink);
            color: var(--rich-black);
            line-height: 1.6;
            text-align: center;
        }

        /* --- NAVIGATION --- */
        nav {
            background: var(--white);
            padding: 20px 0;
            border-bottom: 10px solid var(--bold-pink);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: var(--rich-black);
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 12px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        nav a:hover { color: var(--bold-pink); }

        /* --- CONTACT SECTION --- */
        .wrapper {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .contact-card {
            background: var(--white);
            border: 10px solid var(--rich-black);
            padding: 60px 40px;
            box-shadow: 25px 25px 0px var(--bold-pink);
            position: relative;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            line-height: 0.9;
            margin: 0 0 30px 0;
            text-transform: uppercase;
            color: var(--rich-black);
        }

        p {
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            margin-bottom: 40px;
        }

        /* --- NEW: CSS FOR YOUR CONTACT PHOTO --- */
        .contact-photo {
            max-width: 250px; /* Adjust size as needed */
            height: auto;
            border: 8px solid var(--rich-black);
            box-shadow: 15px 15px 0px var(--bold-pink);
            margin-bottom: 30px;
        }

        /* --- BUTTONS --- */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-btn {
            background: var(--bold-pink);
            color: var(--white);
            text-decoration: none;
            padding: 20px;
            font-size: 1.2rem;
            border: 4px solid var(--rich-black);
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: var(--rich-black);
            transform: translate(-5px, -5px);
            box-shadow: 8px 8px 0px var(--accent-pink);
        }

        .form-status {
            margin-top: 40px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-pink);
        }

        footer {
            margin-top: 100px;
            padding: 40px;
            font-size: 0.7rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="aboutmeada.html">About Me</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="certifications.html">Certifications</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="wrapper">
        <div class="contact-card">
            
            <h1>LET'S<br>TALK.</h1>

            <img src="contactme.jpg" alt="Contact Adamma West" class="contact-photo">

            <p>I'm currently open to opportunities in Software Engineering and Medical Informatics </p>
            
            <div class="button-stack">
                <a href="mailto:westadamma@gmail.com" class="contact-btn">SEND AN EMAIL</a>
                <a href="https://linkedin.com/in/adamma-west" target="_blank" class="contact-btn">LINKEDIN PROFILE</a>
            </div>

            <div class="form-status">
                Contact Form Coming Soon
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Adamma West 
    </footer>

</body>
</html>
