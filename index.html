<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adamma West | Home</title>
    <style>
        :root {
            --bold-pink: #ff007f;
            --accent-pink: #ff66b2;
            --bg-pink: #fff0f6;
            --rich-black: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Arial Black', Gadget, sans-serif;
            margin: 0;
            background-color: var(--bg-pink);
            color: var(--rich-black);
            line-height: 1.6;
        }

        nav {
            background: var(--white);
            padding: 20px 0;
            text-align: center;
            border-bottom: 10px solid var(--bold-pink);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            text-decoration: none;
            color: var(--rich-black);
            font-weight: 900;
            text-transform: uppercase;
            margin: 0 12px;
            font-size: 0.85rem;
        }

        .hero {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        .hero-card {
            background: var(--white);
            border: 10px solid var(--rich-black);
            padding: 60px 20px;
            box-shadow: 25px 25px 0px var(--bold-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: clamp(3rem, 12vw, 5rem);
            line-height: 0.8;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        /* --- STYLED IMAGE CONTAINER --- */
        .photo-container {
            width: 100%;
            max-width: 600px;
            border: 8px solid var(--rich-black);
            margin: 30px 0;
            overflow: hidden;
            background: var(--bold-pink);
        }

        .photo-container img {
            width: 100%;
            display: block;
            filter: contrast(1.1); /* Makes it pop like a magazine */
        }

        .tagline {
            background: var(--bold-pink);
            color: white;
            display: inline-block;
            padding: 10px 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-top: 10px;
        }

        footer {
            margin-top: 60px;
            padding: 40px;
            font-size: 0.7rem;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav>
        <div style="margin-bottom: 10px;">
            <span style="font-size: 1.5rem; display: block; color: var(--bold-pink);">ADAMMA WEST</span>
            <span style="font-size: 0.7rem; letter-spacing: 2px; color: var(--rich-black); opacity: 0.7;">SOFTWARE ENGINEER | PHARMACY INFORMATICS</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; width: 50px; margin: 10px auto;">
        <a href="index.html">Home</a>
        <a href="aboutmeada.html">About Me</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="certifications.html">Certifications</a>
        <a href="resume.html">Resume</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main class="hero">
        <div class="hero-card">
            <h1>WELCOME<br>WORLD.</h1>
            
            <!-- YOUR IMAGE -->
            <div class="photo-container">
                <img src="pinksoft.jpg" alt="Software Engineering Graphic">
            </div>

            <div class="tagline">Phase 2 Portfolio</div>
            <p style="font-family: Arial, sans-serif; font-weight: bold; margin-top: 20px; max-width: 500px;">
                Exploring the intersection of Computer Science and Medical Innovation at Colorado State University.
            </p>
        </div>
    </main>

    <footer>
        &copy; 2026 Adamma West | Student Portfolio
    </footer>

</body>
</html>
